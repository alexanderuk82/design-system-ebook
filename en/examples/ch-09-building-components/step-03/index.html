<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example 09_03 - Accessible Input</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <main class="page">
    <h1>Input</h1>
    <p>
      Label required in TypeScript, helper and error connected via
      <code>aria-describedby</code>, error with <code>role="alert"</code>.
      The component carries the accessibility, not the product team.
    </p>

    <div id="root"></div>
  </main>

  <script type="text/babel" data-presets="typescript,react">
    const { useId, useState, forwardRef } = React;

    interface InputProps extends Omit<React.InputHTMLAttributes<HTMLInputElement>, "id"> {
      label: string;
      helper?: string;
      error?: string;
      id?: string;
      visuallyHiddenLabel?: boolean;
    }

    const Input = forwardRef<HTMLInputElement, InputProps>(function Input(
      { label, helper, error, id, visuallyHiddenLabel, ...rest },
      ref
    ) {
      const generatedId = useId();
      const inputId = id ?? generatedId;
      const helperId = `${inputId}-helper`;
      const errorId = `${inputId}-error`;

      const describedBy = error ? errorId : helper ? helperId : undefined;

      return (
        <div className="field" data-error={Boolean(error) || undefined}>
          <label
            htmlFor={inputId}
            className={visuallyHiddenLabel ? "label visually-hidden" : "label"}
          >
            {label}
          </label>
          <input
            ref={ref}
            id={inputId}
            aria-invalid={Boolean(error) || undefined}
            aria-describedby={describedBy}
            {...rest}
          />
          {helper && !error && (
            <span id={helperId} className="helper">{helper}</span>
          )}
          {error && (
            <span id={errorId} className="error" role="alert">{error}</span>
          )}
        </div>
      );
    });

    function App() {
      const [email, setEmail] = useState("");
      const [touched, setTouched] = useState(false);
      const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      const error = touched && !isValid ? "Enter a valid email" : undefined;

      return (
        <form onSubmit={(e) => e.preventDefault()}>
          <section>
            <h2>Common case, with helper</h2>
            <Input
              label="Email address"
              helper="We'll send the confirmation here"
              type="email"
              placeholder="you@company.com"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              onBlur={() => setTouched(true)}
            />
            {error && <p className="hint">The error below appears when you blur with an invalid email.</p>}
          </section>

          <section>
            <h2>With error</h2>
            <Input
              label="Email address"
              helper="We'll send the confirmation here"
              type="email"
              defaultValue="not-an-email"
              error="Enter a valid email"
            />
            <p className="hint">
              The helper disappears when there is an error. The error has
              <code>role="alert"</code> so the screen reader announces it.
            </p>
          </section>

          <section>
            <h2>Disabled</h2>
            <Input
              label="Internal ID"
              defaultValue="USR-7841"
              disabled
              helper="Generated automatically, cannot be edited"
            />
          </section>

          <section>
            <h2>Visually hidden label (not for screen readers)</h2>
            <Input
              label="Search"
              type="search"
              placeholder="Search..."
              visuallyHiddenLabel
            />
            <p className="hint">
              The label still exists in the DOM with class
              <code>visually-hidden</code>, accessible to screen readers.
              Only use it for compact search bars with a magnifier icon.
            </p>
          </section>
        </form>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root")!);
    root.render(<App />);
  </script>
</body>
</html>
