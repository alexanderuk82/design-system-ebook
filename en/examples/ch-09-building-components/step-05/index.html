<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example 09_05 - Compositional Card</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <main class="page">
    <h1>Compositional Card</h1>
    <p>
      Not a component with fifteen props. A Root to which you attach the
      pieces you need in the order you need. Composition beats configuration.
    </p>

    <div id="root"></div>
  </main>

  <script type="text/babel" data-presets="typescript,react">
    type DivProps = React.HTMLAttributes<HTMLDivElement>;
    type ImgProps = React.ImgHTMLAttributes<HTMLImageElement>;

    function CardRoot({ className = "", ...rest }: DivProps) {
      return <div className={`card ${className}`} {...rest} />;
    }
    function CardImage(props: ImgProps) {
      return <img className="card-image" {...props} />;
    }
    function CardHeader(props: DivProps) {
      return <div className="card-header" {...props} />;
    }
    function CardTitle({ children, ...rest }: React.HTMLAttributes<HTMLHeadingElement>) {
      return <h3 className="card-title" {...rest}>{children}</h3>;
    }
    function CardSubtitle({ children, ...rest }: React.HTMLAttributes<HTMLParagraphElement>) {
      return <p className="card-subtitle" {...rest}>{children}</p>;
    }
    function CardBody(props: DivProps) {
      return <div className="card-body" {...props} />;
    }
    function CardFooter(props: DivProps) {
      return <div className="card-footer" {...props} />;
    }

    const Card = Object.assign(CardRoot, {
      Image: CardImage,
      Header: CardHeader,
      Title: CardTitle,
      Subtitle: CardSubtitle,
      Body: CardBody,
      Footer: CardFooter,
    });

    function Button({ children, ...rest }: React.ButtonHTMLAttributes<HTMLButtonElement>) {
      return <button className="btn" {...rest}>{children}</button>;
    }

    function App() {
      return (
        <div className="grid">
          <Card>
            <Card.Image src="https://picsum.photos/seed/ds1/600/300" alt="" />
            <Card.Header>
              <Card.Title>API design</Card.Title>
              <Card.Subtitle>Chapter 8</Card.Subtitle>
            </Card.Header>
            <Card.Body>Learn to avoid Buttons with 17 props.</Card.Body>
            <Card.Footer>
              <Button>Read</Button>
            </Card.Footer>
          </Card>

          <Card>
            <Card.Header>
              <Card.Title>No image, no subtitle</Card.Title>
            </Card.Header>
            <Card.Body>
              This Card omits Image and Subtitle. The layout adjusts on its
              own because every subcomponent is optional.
            </Card.Body>
          </Card>

          <Card>
            <Card.Image src="https://picsum.photos/seed/ds2/600/300" alt="" />
            <Card.Body>
              This Card puts Body right after Image, no Header. The
              consumer decides the order, the component absorbs it.
            </Card.Body>
            <Card.Footer>
              <Button>See more</Button>
            </Card.Footer>
          </Card>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root")!);
    root.render(<App />);
  </script>
</body>
</html>
