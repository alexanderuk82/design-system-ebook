<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example 09_07 - Accessible Navigation</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <main class="page">
    <h1>Accessible Navigation</h1>
    <p>
      The active state is carried by <code>aria-current="page"</code>, not
      a parallel classname. CSS decorates the attribute. A screen reader
      user hears where they are, not just sees it.
    </p>

    <div id="root"></div>
  </main>

  <script type="text/babel" data-presets="typescript,react">
    const { useState } = React;

    interface NavItem {
      href: string;
      label: string;
      icon?: React.ReactNode;
    }

    interface NavigationProps {
      items: NavItem[];
      currentPath: string;
      label?: string;
      onNavigate?: (href: string) => void;
    }

    function Navigation({ items, currentPath, label = "Main", onNavigate }: NavigationProps) {
      return (
        <nav aria-label={label} className="nav">
          <ul className="nav-list">
            {items.map((item) => {
              const isActive = item.href === currentPath;
              return (
                <li key={item.href}>
                  <a
                    href={item.href}
                    aria-current={isActive ? "page" : undefined}
                    className="nav-item"
                    onClick={(e) => {
                      if (onNavigate) {
                        e.preventDefault();
                        onNavigate(item.href);
                      }
                    }}
                  >
                    {item.icon && <span className="nav-icon" aria-hidden="true">{item.icon}</span>}
                    <span>{item.label}</span>
                  </a>
                </li>
              );
            })}
          </ul>
        </nav>
      );
    }

    function App() {
      const [pathname, setPathname] = useState("/");

      const main: NavItem[] = [
        { href: "/",           label: "Home",        icon: "⌂" },
        { href: "/components", label: "Components",  icon: "▢" },
        { href: "/tokens",     label: "Tokens",      icon: "◇" },
        { href: "/guides",     label: "Guides",      icon: "✪" },
      ];

      const footer: NavItem[] = [
        { href: "/about",   label: "About the project" },
        { href: "/changes", label: "Changelog" },
        { href: "/rfc",     label: "RFCs" },
      ];

      return (
        <div>
          <section>
            <h2>Main nav (with icons)</h2>
            <Navigation
              items={main}
              currentPath={pathname}
              label="Main"
              onNavigate={setPathname}
            />
            <p className="hint">
              Click an item. The active state moves and
              <code>aria-current="page"</code> moves with it.
            </p>
          </section>

          <section>
            <h2>Footer nav (same component, different ARIA label)</h2>
            <Navigation
              items={footer}
              currentPath={pathname}
              label="Footer links"
              onNavigate={setPathname}
            />
            <p className="hint">
              Two <code>&lt;nav&gt;</code> on the same page need different
              <code>aria-label</code>s so a screen reader can tell them
              apart in the landmarks list.
            </p>
          </section>

          <p className="status">
            Current path: <code>{pathname}</code>
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root")!);
    root.render(<App />);
  </script>
</body>
</html>
