<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example 01_01 - From token to button</title>
  <link rel="stylesheet" href="./dist/variables.css">
  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      line-height: 1.55;
      color: #1a1a1a;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p { color: #4a4a4a; }
    code {
      background: #f4f4f5;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .button-primary {
      background: var(--color-brand-primary);
      color: white;
      border: 0;
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      font: inherit;
      cursor: pointer;
      margin-top: 1.5rem;
    }
    .button-primary:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <h1>From token to button</h1>
  <p>
    The button colour comes from <code>--color-brand-primary</code>,
    which points at <code>--color-blue-500</code>. Change the primitive
    in the JSON, run the build, and this button picks it up without
    anyone touching a line of HTML or CSS by hand.
  </p>
  <button type="button" class="button-primary">Primary action</button>
</body>
</html>
